<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BattleDebug Findings</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: #1a1a2e;
            color: #eee;
            padding: 20px;
            line-height: 1.6;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 2px solid #333;
        }

        h1 {
            color: #00d9ff;
            font-size: 2rem;
        }

        .stats {
            display: flex;
            gap: 20px;
        }

        .stat-box {
            background: #252540;
            padding: 10px 20px;
            border-radius: 8px;
            text-align: center;
        }

        .stat-value {
            font-size: 1.5rem;
            font-weight: bold;
            color: #00d9ff;
        }

        .stat-label {
            font-size: 0.8rem;
            color: #888;
        }

        .filters {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .filter-group {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .filter-group label {
            font-size: 0.9rem;
            color: #888;
        }

        select, input[type="text"] {
            background: #252540;
            border: 1px solid #444;
            color: #eee;
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 0.9rem;
        }

        .finding-card {
            background: #252540;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 15px;
            border-left: 4px solid #666;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .finding-card:hover {
            transform: translateX(5px);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
        }

        .finding-card.critical { border-left-color: #ff4444; }
        .finding-card.high { border-left-color: #ff8844; }
        .finding-card.medium { border-left-color: #ffcc00; }
        .finding-card.low { border-left-color: #44ff88; }

        .finding-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 10px;
        }

        .finding-id {
            font-family: monospace;
            color: #888;
            font-size: 0.85rem;
        }

        .finding-title {
            font-size: 1.1rem;
            font-weight: 600;
            color: #fff;
            margin: 5px 0;
        }

        .finding-badges {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .badge {
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
        }

        .badge-severity { background: #333; }
        .badge-category { background: #1a3a4a; color: #00d9ff; }
        .badge-status { background: #1a4a1a; color: #44ff88; }
        .badge-status.open { background: #4a1a1a; color: #ff8844; }
        .badge-status.investigating { background: #3a3a1a; color: #ffcc00; }
        .badge-status.addressed { background: #1a4a1a; color: #44ff88; }

        .finding-summary {
            color: #bbb;
            margin: 10px 0;
        }

        .finding-details {
            display: none;
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid #444;
        }

        .finding-card.expanded .finding-details {
            display: block;
        }

        .detail-section {
            margin-bottom: 15px;
        }

        .detail-section h4 {
            color: #00d9ff;
            font-size: 0.85rem;
            margin-bottom: 5px;
        }

        .detail-section pre {
            background: #1a1a2e;
            padding: 10px;
            border-radius: 6px;
            overflow-x: auto;
            font-size: 0.85rem;
        }

        .confidence-bar {
            height: 6px;
            background: #333;
            border-radius: 3px;
            margin-top: 10px;
        }

        .confidence-fill {
            height: 100%;
            background: linear-gradient(90deg, #ff4444, #ffcc00, #44ff88);
            border-radius: 3px;
        }

        .expand-btn {
            background: none;
            border: none;
            color: #00d9ff;
            cursor: pointer;
            font-size: 0.9rem;
            padding: 5px 0;
        }

        .expand-btn:hover {
            text-decoration: underline;
        }

        .load-section {
            background: #252540;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 30px;
        }

        .load-section h3 {
            margin-bottom: 15px;
            color: #00d9ff;
        }

        .load-section textarea {
            width: 100%;
            height: 150px;
            background: #1a1a2e;
            border: 1px solid #444;
            color: #eee;
            padding: 10px;
            border-radius: 6px;
            font-family: monospace;
            font-size: 0.85rem;
        }

        .load-section button {
            margin-top: 10px;
            background: #00d9ff;
            color: #1a1a2e;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
        }

        .load-section button:hover {
            background: #00b8d9;
        }

        .no-findings {
            text-align: center;
            padding: 50px;
            color: #666;
        }

        .actions {
            margin-top: 10px;
            display: flex;
            gap: 10px;
        }

        .action-btn {
            background: #333;
            border: none;
            color: #888;
            padding: 5px 10px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.8rem;
        }

        .action-btn:hover {
            background: #444;
            color: #fff;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>BattleDebug Findings</h1>
            <div class="stats">
                <div class="stat-box">
                    <div class="stat-value" id="total-count">0</div>
                    <div class="stat-label">Total</div>
                </div>
                <div class="stat-box">
                    <div class="stat-value" id="open-count">0</div>
                    <div class="stat-label">Open</div>
                </div>
                <div class="stat-box">
                    <div class="stat-value" id="high-count">0</div>
                    <div class="stat-label">High/Critical</div>
                </div>
            </div>
        </header>

        <div class="load-section">
            <h3>Load Findings</h3>
            <textarea id="json-input" placeholder="Paste findings JSON here (array of finding objects), or drag and drop a .json file..."></textarea>
            <button onclick="loadFindings()">Load Findings</button>
        </div>

        <div class="filters">
            <div class="filter-group">
                <label>Status:</label>
                <select id="filter-status" onchange="applyFilters()">
                    <option value="all">All</option>
                    <option value="open">Open</option>
                    <option value="investigating">Investigating</option>
                    <option value="addressed">Addressed</option>
                    <option value="dismissed">Dismissed</option>
                </select>
            </div>
            <div class="filter-group">
                <label>Severity:</label>
                <select id="filter-severity" onchange="applyFilters()">
                    <option value="all">All</option>
                    <option value="critical">Critical</option>
                    <option value="high">High</option>
                    <option value="medium">Medium</option>
                    <option value="low">Low</option>
                </select>
            </div>
            <div class="filter-group">
                <label>Category:</label>
                <select id="filter-category" onchange="applyFilters()">
                    <option value="all">All</option>
                    <option value="bug">Bug</option>
                    <option value="balance">Balance</option>
                    <option value="difficulty">Difficulty</option>
                    <option value="ai">AI</option>
                    <option value="feel">Feel</option>
                </select>
            </div>
            <div class="filter-group">
                <label>Search:</label>
                <input type="text" id="filter-search" placeholder="Search titles..." oninput="applyFilters()">
            </div>
        </div>

        <div id="findings-container">
            <div class="no-findings">
                Load findings JSON to view
            </div>
        </div>
    </div>

    <script>
        let allFindings = [];

        // Drag and drop support
        document.getElementById('json-input').addEventListener('dragover', (e) => {
            e.preventDefault();
            e.target.style.borderColor = '#00d9ff';
        });

        document.getElementById('json-input').addEventListener('dragleave', (e) => {
            e.target.style.borderColor = '#444';
        });

        document.getElementById('json-input').addEventListener('drop', (e) => {
            e.preventDefault();
            e.target.style.borderColor = '#444';
            const file = e.dataTransfer.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (event) => {
                    document.getElementById('json-input').value = event.target.result;
                    loadFindings();
                };
                reader.readAsText(file);
            }
        });

        function loadFindings() {
            const input = document.getElementById('json-input').value.trim();
            if (!input) return;

            try {
                const data = JSON.parse(input);
                allFindings = Array.isArray(data) ? data : [data];
                updateStats();
                applyFilters();
            } catch (e) {
                alert('Invalid JSON: ' + e.message);
            }
        }

        function updateStats() {
            document.getElementById('total-count').textContent = allFindings.length;
            document.getElementById('open-count').textContent =
                allFindings.filter(f => f.status === 'open' || !f.status).length;
            document.getElementById('high-count').textContent =
                allFindings.filter(f => f.severity === 'high' || f.severity === 'critical').length;
        }

        function applyFilters() {
            const status = document.getElementById('filter-status').value;
            const severity = document.getElementById('filter-severity').value;
            const category = document.getElementById('filter-category').value;
            const search = document.getElementById('filter-search').value.toLowerCase();

            const filtered = allFindings.filter(f => {
                if (status !== 'all' && (f.status || 'open') !== status) return false;
                if (severity !== 'all' && f.severity !== severity) return false;
                if (category !== 'all' && f.category !== category) return false;
                if (search && !f.title?.toLowerCase().includes(search)) return false;
                return true;
            });

            renderFindings(filtered);
        }

        function renderFindings(findings) {
            const container = document.getElementById('findings-container');

            if (findings.length === 0) {
                container.innerHTML = '<div class="no-findings">No findings match your filters</div>';
                return;
            }

            // Sort by severity (critical first) then by date
            const severityOrder = { critical: 0, high: 1, medium: 2, low: 3 };
            findings.sort((a, b) => {
                const sevA = severityOrder[a.severity] ?? 4;
                const sevB = severityOrder[b.severity] ?? 4;
                if (sevA !== sevB) return sevA - sevB;
                return (b.created_at || '').localeCompare(a.created_at || '');
            });

            container.innerHTML = findings.map(f => renderFindingCard(f)).join('');
        }

        function renderFindingCard(f) {
            const statusClass = (f.status || 'open');
            const confidence = f.confidence || 0;
            const confidencePercent = Math.round(confidence * 100);

            return `
                <div class="finding-card ${f.severity || 'low'}" id="card-${f.id}">
                    <div class="finding-header">
                        <div>
                            <div class="finding-id">${f.id || 'No ID'}</div>
                            <div class="finding-title">${escapeHtml(f.title || 'Untitled')}</div>
                        </div>
                        <div class="finding-badges">
                            <span class="badge badge-severity">${f.severity || 'unknown'}</span>
                            <span class="badge badge-category">${f.category || 'unknown'}</span>
                            <span class="badge badge-status ${statusClass}">${f.status || 'open'}</span>
                        </div>
                    </div>
                    <div class="finding-summary">${escapeHtml(f.summary || 'No summary')}</div>
                    <div class="confidence-bar">
                        <div class="confidence-fill" style="width: ${confidencePercent}%"></div>
                    </div>
                    <div style="font-size: 0.8rem; color: #666; margin-top: 5px;">
                        Confidence: ${confidencePercent}%
                    </div>
                    <button class="expand-btn" onclick="toggleExpand('${f.id}')">
                        Show details
                    </button>
                    <div class="finding-details">
                        ${f.hypothesis ? `
                            <div class="detail-section">
                                <h4>Hypothesis</h4>
                                <p>${escapeHtml(f.hypothesis)}</p>
                            </div>
                        ` : ''}
                        ${f.evidence ? `
                            <div class="detail-section">
                                <h4>Evidence</h4>
                                <pre>${JSON.stringify(f.evidence, null, 2)}</pre>
                            </div>
                        ` : ''}
                        ${f.suggested_action ? `
                            <div class="detail-section">
                                <h4>Suggested Action</h4>
                                <p>${escapeHtml(f.suggested_action)}</p>
                            </div>
                        ` : ''}
                        ${f.code_paths?.length ? `
                            <div class="detail-section">
                                <h4>Code Paths</h4>
                                <pre>${f.code_paths.join('\n')}</pre>
                            </div>
                        ` : ''}
                        <div class="actions">
                            <button class="action-btn" onclick="setStatus('${f.id}', 'investigating')">Mark Investigating</button>
                            <button class="action-btn" onclick="setStatus('${f.id}', 'addressed')">Mark Addressed</button>
                            <button class="action-btn" onclick="setStatus('${f.id}', 'dismissed')">Dismiss</button>
                        </div>
                    </div>
                </div>
            `;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function toggleExpand(id) {
            const card = document.getElementById('card-' + id);
            card.classList.toggle('expanded');
            const btn = card.querySelector('.expand-btn');
            btn.textContent = card.classList.contains('expanded') ? 'Hide details' : 'Show details';
        }

        function setStatus(id, status) {
            const finding = allFindings.find(f => f.id === id);
            if (finding) {
                finding.status = status;
                finding.updated_at = new Date().toISOString();
                updateStats();
                applyFilters();
            }
        }
    </script>
</body>
</html>
